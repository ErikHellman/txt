name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tar -czf txt-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release txt

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/txt.exe" `
            -DestinationPath "txt-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: txt-${{ github.ref_name }}-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Extract release notes
        run: |
          VERSION="${{ github.ref_name }}"
          awk "/^## ${VERSION}/{found=1; next} /^## /{if(found) exit} found" \
            CHANGELOG.md | sed '/^[[:space:]]*$/d' > release_notes.txt

      - name: Generate checksums
        run: sha256sum txt-* > checksums.txt

      - uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            txt-*
            checksums.txt
          body_path: release_notes.txt
